# OSneakers Nginx config — place at /etc/nginx/sites-available/osneakers
# Certbot will edit this file when you run `sudo certbot --nginx`.

server {
    listen 80;
    listen [::]:80;
    server_name osneakers.net www.osneakers.net;

    # React frontend (production build)
    root /home/osneakers/osneakers/frontend/build;
    index index.html;

    # Tighten upload size (image uploads later, if needed)
    client_max_body_size 20M;

    # Gzip compression for static assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Long-cache hashed static assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → FastAPI backend on 127.0.0.1:8001
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # React Router fallback — every other path serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
